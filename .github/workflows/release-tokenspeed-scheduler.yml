name: Build and Release tokenspeed-scheduler

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create or update. Defaults to tokenspeed-scheduler-v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade build twine
          cd tokenspeed-scheduler
          python -m build --wheel --outdir ../dist
          python -m twine check ../dist/*

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: tokenspeed-scheduler-wheel-py${{ matrix.python-version }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build twine
          cd tokenspeed-scheduler
          python -m build --sdist --outdir ../dist
          python -m twine check ../dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: tokenspeed-scheduler-sdist
          path: dist/*.tar.gz

  release:
    name: Create GitHub release
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: metadata
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("tokenspeed-scheduler/pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          TAG_NAME="${{ inputs.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="tokenspeed-scheduler-v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"
          echo "Release tag: ${TAG_NAME}"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokenspeed-scheduler-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          VERSION: ${{ steps.metadata.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --target "$GITHUB_SHA" \
              --title "tokenspeed-scheduler ${VERSION}" \
              --notes "tokenspeed-scheduler ${VERSION}" \
              "${prerelease_args[@]}"
          fi
